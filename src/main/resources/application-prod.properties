# ===== PROD profile overrides =====
spring.h2.console.enabled=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
server.error.include-stacktrace=never

# Supabase / PostgreSQL Configuration
# Example JDBC URL:
# jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
spring.datasource.url=${SUPABASE_DB_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Rely entirely on schema.sql to manage tables (prevents Hibernate from dropping constraints)
spring.jpa.hibernate.ddl-auto=none

# Supabase databases are persistent. Avoid re-running schema/data scripts on each boot.
# If you need one-time bootstrap, set SPRING_SQL_INIT_MODE=always temporarily.
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
