# ========================
# Taka Bachai - Application Config
# ========================

# Active profile: 'dev' (default) enables the H2 console and verbose SQL.
# Use 'prod' on Render to disable the console and quiet logs.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# H2 in-memory DB in PostgreSQL compatibility mode.
spring.datasource.url=jdbc:h2:mem:takabachaidb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Optional Supabase / PostgreSQL config (uncomment to use)
#spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
#spring.datasource.username=postgres
#spring.datasource.password=YOUR_SUPABASE_PASSWORD
#spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
# Schema and seed data are managed entirely by schema.sql + data.sql,
# so Hibernate must NOT recreate tables (which would drop our DEFAULTs,
# UNIQUE constraints and ON DELETE CASCADE rules).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL Initialization (runs schema.sql then data.sql on startup)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

# File Upload Config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
