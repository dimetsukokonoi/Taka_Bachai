# ========================
# Taka Bachai - Application Config
# ========================

server.port=8080

# Local H2 Database Connection (For Testing)
spring.datasource.url=jdbc:h2:mem:takabachaidb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Supabase PostgreSQL Connection (Uncomment and replace to use Supabase)
#spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
#spring.datasource.username=postgres
#spring.datasource.password=YOUR_SUPABASE_PASSWORD
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization (runs schema.sql and data.sql on startup)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# File Upload Config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
